<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Sign Up - LifeCycle Consumption Calculator</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .login-container { max-width: 400px; margin-top: 100px; }
    </style>
</head>
<body>
<div class="container login-container">
    <div class="card shadow-sm border-success">
        <div class="card-body p-4 text-center">
            <h2 class="fw-bold mb-4 text-success">Sign Up</h2>
            <p class="text-muted mb-4">Make a new account to continue using our service</p>

            <div th:if="${param.error}" class="alert alert-danger" role="alert">
                Sign Up failed. Username may already exist.
            </div>

            <form action="/user/signup" method="post">
                <div class="mb-3 text-start">
                    <label class="form-label fw-bold">Desired Username</label>
                    <input type="text" name="username" class="form-control" placeholder="Username" required>
                </div>
                <div class="mb-4 text-start">
                    <label class="form-label fw-bold">Desired Password</label>
                    <input type="password" name="password" class="form-control" placeholder="Password" required>
                </div>
                <button type="submit" class="btn btn-success w-100 py-2 fw-bold fs-5">Sign Up</button>
            </form>

            <hr class="mt-4">
            <p class="text-muted">Already have an account?
                <a href="/login" class="text-decoration-none fw-bold text-success">Log in</a>
            </p>
        </div>
    </div>
</div>
</body>
</html>
