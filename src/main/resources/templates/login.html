<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Login - LifeCycle Consumption Calculator</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {background-color: #f8f9fa;}
        .login-container {max-width: 480px; margin-top: 100px;}
    </style>
</head>
<body>
<div class="container login-container">
    <div class="card shadow-sm">
        <div class="card-body p-4 text-center">
            <h2 class="fw-bold mb-4 text-primary">Login</h2>
            <p class="text-muted mb-4">To save your calculation, please log in.</p>

            <div th:if="${param.error}" class="alert alert-danger" role="alert">
                username or password does not match.
            </div>

            <form action="/user/login" method="post">
                <div class="mb-3 text-start">
                    <label class="form-label fw-bold">username</label>
                    <input type="text" name="username" class="form-control" placeholder="Enter your username..." required>
                </div>
                <div class="mb-4 text-start">
                    <label class="form-label fw-bold">password</label>
                    <input type="password" name="password" class="form-control" placeholder="Enter your password..." required>
                </div>
                <button type="submit" class="btn btn-primary w-100 py-2 fw-bold fs-5">Continue</button>
            </form>

            <hr class="mt-4">
            <p class="text-muted">No account yet? No Problem!
                <a href="/user/signup" class="text-decoration-none fw-bold">Sign Up</a>
            </p>
        </div>
    </div>
</div>
</body>
</html>
