<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Settings - LifeCycle Consumption Calculator</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {background-color: #f8f9fa;}
        .login-container {max-width: 480px; margin-top: 100px;}
    </style>
</head>
<body>
<div class="container settings-container">
    <div class="card shadow-sm">
        <div class="card-body p-4 text-center">
            <h2 class="fw-bold mb-4 text-primary">Settings</h2>
            <p class="text-muted mb-4">Change your password</p>

            <form action="/user/settings" method="post">
                <div class="mb-3 text-start">
                    <input type="hidden" name="username" th:value="${username}" class="form-control" readonly>
                </div>
                <div class="mb-4 text-start">
                    <label class="form-label fw-bold">New password</label>
                    <input type="password" name="password" class="form-control" placeholder="Enter your NEW password..." required>
                </div>
                <button type="submit" class="btn btn-primary w-100 py-2 fw-bold fs-5">Continue</button>
            </form>
        </div>
    </div>
</div>
</body>
</html>
